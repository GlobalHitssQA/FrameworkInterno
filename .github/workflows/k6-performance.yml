name: k6 Performance Tests

# Este workflow ejecuta las pruebas de performance con k6.
# Por defecto sólo corre en ejecución manual (workflow_dispatch) para no
# alargar los tiempos del CI regular. También se dispara cuando cambian los
# archivos relacionados con la suite de performance.

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Escenario a ejecutar (smoke, load, stress, spike, soak, api, all)'
        required: true
        default: 'smoke'
      env:
        description: 'Entorno objetivo (dev, staging, prod)'
        required: true
        default: 'dev'
  push:
    branches: [ master ]
    paths:
      - 'performance/**'
      - '.github/workflows/k6-performance.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'performance/**'
      - '.github/workflows/k6-performance.yml'

jobs:
  k6:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run k6 scenario (manual dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          K6_ENV: ${{ github.event.inputs.env }}
        run: |
          SCENARIO="${{ github.event.inputs.scenario }}"
          if [ "$SCENARIO" = "all" ]; then
            npm run k6:all
          else
            npx ts-node performance/runK6.ts "$SCENARIO" --env="$K6_ENV"
          fi

      - name: Run smoke test (push/PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: npm run k6:smoke

      - name: Upload k6 summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: output/k6/
          if-no-files-found: ignore
